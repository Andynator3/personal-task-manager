<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Connexion</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="Votre identifiant" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="loading || !username || !password">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-link">Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
  </div>
</div>
